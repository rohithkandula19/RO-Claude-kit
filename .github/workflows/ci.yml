name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install Node deps
        run: pnpm install --no-frozen-lockfile

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python deps
        run: uv sync --all-packages

      - name: Lint
        run: pnpm run lint

      - name: Test (Node)
        run: pnpm run test

      - name: Install Python deps (with dev groups)
        run: uv sync --all-packages --all-groups

      - name: Test (Python)
        run: |
          uv run --frozen pytest \
            packages/agent-patterns \
            packages/eval-suite \
            packages/memory \
            packages/hardening \
            packages/mcp-servers \
            packages/cli \
            apps/demo \
            -q

      - name: Smoke test csk CLI
        run: |
          mkdir -p /tmp/csk-smoke && cd /tmp/csk-smoke
          uv --project "$GITHUB_WORKSPACE" run csk init --demo -y
          uv --project "$GITHUB_WORKSPACE" run csk tools
          uv --project "$GITHUB_WORKSPACE" run csk doctor
          uv --project "$GITHUB_WORKSPACE" run csk version
