name: Release

# Tag-triggered: push a tag like v0.2.0 and this workflow builds + publishes
# every workspace package (and the CLI binary) to PyPI.
#
# Setup once: add a PyPI API token as the repo secret PYPI_TOKEN
# (https://pypi.org/help/#apitoken).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Build all packages
        run: |
          set -e
          for pkg in packages/agent-patterns \
                    packages/eval-suite \
                    packages/memory \
                    packages/hardening \
                    packages/mcp-servers \
                    packages/cli; do
            echo "::group::Building $pkg"
            uv build "$pkg" --out-dir dist
            echo "::endgroup::"
          done
          ls -la dist/

      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          if [ -z "$UV_PUBLISH_TOKEN" ]; then
            echo "PYPI_TOKEN secret is not set. Skipping publish."
            exit 0
          fi
          uv publish dist/*
