[project]
name = "ro-claude-kit-mcp-servers"
version = "0.0.1"
description = "Reference MCP server templates: Postgres (read-only). Stripe / Linear / Slack / Notion to follow."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.5",
]

[project.optional-dependencies]
postgres = ["psycopg2-binary>=2.9"]
mcp = ["mcp>=1.0"]

[dependency-groups]
dev = [
    "pytest>=7.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ro_claude_kit_mcp_servers"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
