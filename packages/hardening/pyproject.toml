[project]
name = "ro-claude-kit-hardening"
version = "0.0.1"
description = "Production hardening for Claude agents: prompt-injection defense, tool guardrails, output validation, observability."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "anthropic>=0.40.0",
    "pydantic>=2.5",
]

[dependency-groups]
dev = [
    "pytest>=7.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ro_claude_kit_hardening"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
