[project]
name = "ro-claude-kit-eval-suite"
version = "0.0.1"
description = "LLM-as-a-judge eval suite with golden datasets, drift detection, and HTML reports."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "anthropic>=0.40.0",
    "pydantic>=2.5",
]

[dependency-groups]
dev = [
    "pytest>=7.0",
]

[project.scripts]
csk-eval = "ro_claude_kit_eval_suite.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ro_claude_kit_eval_suite"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
