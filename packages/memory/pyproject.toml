[project]
name = "ro-claude-kit-memory"
version = "0.0.1"
description = "Three-layer memory for Claude agents: short-term (compressed history), long-term (pluggable vector store), user preferences."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "anthropic>=0.40.0",
    "pydantic>=2.5",
]

[project.optional-dependencies]
chromadb = ["chromadb>=0.5"]

[dependency-groups]
dev = [
    "pytest>=7.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ro_claude_kit_memory"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
