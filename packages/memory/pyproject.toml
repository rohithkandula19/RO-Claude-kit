[project]
name = "ro-claude-kit-memory"
version = "0.0.1"
description = "Three-layer memory for Claude agents: short-term (compressed history), long-term (vector store), user preferences."
readme = "README.md"
requires-python = ">=3.11"
dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ro_claude_kit_memory"]
