[project]
name = "ro-claude-kit-cli"
version = "0.1.0"
description = "csk — the Claude-powered CLI for startup ops. Ask questions across your Stripe / Linear / Slack / Notion / Postgres in one shot."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "anthropic>=0.40.0",
    "pydantic>=2.5",
    "typer>=0.12",
    "rich>=13.7",
    "textual>=0.85",
    "tomli-w>=1.0",
    "ro-claude-kit-agent-patterns",
    "ro-claude-kit-hardening",
    "ro-claude-kit-memory",
    "ro-claude-kit-mcp-servers",
    "ro-claude-kit-eval-suite",
]

[project.scripts]
csk = "ro_claude_kit_cli.main:app"

[project.optional-dependencies]
postgres = ["psycopg2-binary>=2.9"]

[dependency-groups]
dev = [
    "pytest>=7.0",
]

[tool.uv.sources]
ro-claude-kit-agent-patterns = { workspace = true }
ro-claude-kit-hardening = { workspace = true }
ro-claude-kit-memory = { workspace = true }
ro-claude-kit-mcp-servers = { workspace = true }
ro-claude-kit-eval-suite = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ro_claude_kit_cli"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
